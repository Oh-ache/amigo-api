syntax = "proto3";

package ai;

option go_package = "./pb";

enum TaskType {
    TEXT_TO_IMAGE = 0;
    VIDEO = 1;
    AUDIO = 2;
}

message SubmitTaskReq {
    TaskType task_type = 1;
    string prompt = 2;
    string params = 3;
    int64 user_id = 4;
}

message SubmitTaskResp {
    int64 id = 1;
    string task_id = 2;
}

message GetTaskReq {
    int64 id = 1;
    int64 user_id = 2;
}

message GetTaskResp {
    int64 id = 1;
    int64 user_id = 2;
    string task_id = 3;
    TaskType task_type = 4;
    string prompt = 5;
    string request_info = 6;
    string response_info = 7;
    string result_url = 8;
    int32 status = 9;
    string error_msg = 10;
    int64 created_at = 11;
    int64 updated_at = 12;
}

message UpdateTaskReq {
    int64 id = 1;
    string task_id = 2;
    string response_info = 3;
    string result_url = 4;
    int32 status = 5;
    string error_msg = 6;
}

message UpdateTaskResp {
    bool success = 1;
}

message ListTasksReq {
    int32 page = 1;
    int32 page_size = 2;
    string task_id = 3;
    TaskType task_type = 4;
    int32 status = 5;
    int64 user_id = 6;
}

message ListTasksResp {
    int64 total = 1;
    repeated GetTaskResp list = 2;
}

service AiRpc {
    rpc SubmitTask (SubmitTaskReq) returns (SubmitTaskResp);
    rpc GetTask (GetTaskReq) returns (GetTaskResp);
    rpc UpdateTask (UpdateTaskReq) returns (UpdateTaskResp);
    rpc ListTasks (ListTasksReq) returns (ListTasksResp);
}