syntax = "proto3";

package sdk;

option go_package = "./pb";

message SendCodeReq {
    string platform = 1;
    string send_type = 2;
    string mobile = 3;
}

message SendCodeResp {
    bool success = 1;
}

message CheckCodeReq {
    string platform = 1;
    string send_type = 2;
    string mobile = 3;
    string code = 4;
}

message CheckCodeResp {
    bool success = 1;
}

message IpToAddressReq {
    string ip = 1;
}

message IpToAddressResp {
    string country = 1;
    string province = 2;
    string city = 3;
    string area = 4;
    string isp = 5;
    string lat = 6;
    string lng = 7;
}

message GetCourierReq {
    string logistic_code = 1;
    string customer_name = 2;
}

message GetCourierResp {
}

message ChatResp {
    string content = 1;
}

message ChatReq {
    string content = 1;
}

message GetWeatherReq {
    string code = 1;
    string type = 2;
}

message GetWeatherItem {
    string date = 1;
    string week = 2;
    string weather = 3;
    string temp = 4;
    string wind = 5;
    string weather_icon = 6;
}

message GetWeatherResp {
    repeated GetWeatherItem items = 1;
    string date = 2;
    string week = 3;
    string weather = 4;
    string temp = 5;
    string wind = 6;
    string weather_icon = 7;
    string humidity = 8;

}

message UploadFileReq {
    string file_name = 1;
    bytes file = 2;
}

message UploadFileResp {
    string url = 1;
}

message UploadUrlReq {
    string file_name = 1;
    string url = 2;
}

message UploadUrlResp {
    string url = 1;
}

message GetUploadTokenReq {
    string file_name = 1;
}

message GetUploadTokenResp {
    string token = 1;
    int64 expire = 2;
}

message PngToElnkReq {
  string url = 1;
}

message PngToElnkResp {
  string url = 1;
}

message BaseAiReq {
  string type = 1;
  string prompt = 2;
}

message AiImageGenerationResp {
  string url = 1;
}

service Sdk {
    rpc SendCode (SendCodeReq) returns (SendCodeResp);
    rpc CheckCode (CheckCodeReq) returns (CheckCodeResp);

    rpc IpToAddress (IpToAddressReq) returns (IpToAddressResp);

    rpc GetCourier (GetCourierReq) returns (GetCourierResp);

    rpc Chat (ChatReq) returns (ChatResp);

    rpc GetWeather (GetWeatherReq) returns (GetWeatherResp);

    rpc UploadFile (UploadFileReq) returns (UploadFileResp);
    rpc UploadUrl (UploadUrlReq) returns (UploadUrlResp);
    rpc GetUploadToken (GetUploadTokenReq) returns (GetUploadTokenResp);

    rpc PngToElnk (PngToElnkReq) returns (PngToElnkResp);

    rpc ImageGeneration (BaseAiReq) returns (AiImageGenerationResp);
}
