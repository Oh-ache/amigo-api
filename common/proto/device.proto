syntax = "proto3";

package device;

option go_package = "./pb";

message AddDeviceReq {
    string name = 1;
    uint64 user_id = 2;
    string mac_address = 3;
    string internal_ip = 4;
    string bmp_image = 5;
    int64 is_running = 6;
    string extra_data = 7;
    string firmware = 8;
    string device_group = 9;
}

message DeviceResp {
    uint64 device_id = 1;
    string name = 2;
    uint64 user_id = 3;
    string mac_address = 4;
    string internal_ip = 5;
    string bmp_image = 6;
    int64 is_running = 7;
    string extra_data = 8;
    int64 is_delete = 9;
    uint64 create_time = 10;
    uint64 update_time = 11;
    string firmware = 12;
    string device_group = 13;
}

message GetDeviceReq {
    uint64 device_id = 1;
    string mac_address = 2;
}

message DeleteDeviceReq {
    uint64 device_id = 1;
    string mac_address = 2;
}

message DeleteDeviceResp {
    bool success = 1;
}

message ListDeviceReq {
    int64 page = 1;
    int64 page_size = 2;
    string name = 3;
    uint64 user_id = 4;
    string mac_address = 5;
    string internal_ip = 6;
    int64 is_running = 7;
    int64 is_delete = 8;
    string firmware = 9;
    string device_group = 10;
}

message ListDeviceResp {
    repeated DeviceResp list = 1;
    int64 total = 2;
}

// ==================== App ====================
message AddAppReq {
    string name = 1;
    string app_key = 2;
    string category = 3;
    string version = 4;
    string vendor = 5;
    string icon_bg = 6;
    string icon_color = 7;
    string icon_label = 8;
    string description = 9;
    string sensor_type = 10;
    string extra_data = 11;
}

message AppResp {
    uint64 app_id = 1;
    string name = 2;
    string app_key = 3;
    string category = 4;
    string version = 5;
    string vendor = 6;
    string icon_bg = 7;
    string icon_color = 8;
    string icon_label = 9;
    string description = 10;
    string sensor_type = 11;
    string extra_data = 12;
    int64 is_delete = 13;
    uint64 create_time = 14;
    uint64 update_time = 15;
}

message GetAppReq {
    uint64 app_id = 1;
    string app_key = 2;
}

message DeleteAppReq {
    uint64 app_id = 1;
    string app_key = 2;
}

message DeleteAppResp {
    bool success = 1;
}

message ListAppReq {
    int64 page = 1;
    int64 page_size = 2;
    string name = 3;
    string app_key = 4;
    string category = 5;
    string sensor_type = 6;
    int64 is_delete = 7;
}

message ListAppResp {
    repeated AppResp list = 1;
    int64 total = 2;
}

// ==================== Event ====================
message DeviceEventResp {
    uint64 device_event_id = 1;
    uint64 device_id = 2;
    string event_type = 3;
    string event_level = 4;
    string title = 5;
    string description = 6;
    string source = 7;
    string extra_data = 8;
    int64 is_delete = 9;
    uint64 create_time = 10;
}
message GetDeviceEventReq {
    uint64 device_event_id = 1;
}
message DeleteDeviceEventReq {
    uint64 device_event_id = 1;
    uint64 device_id = 2;
}
message DeleteDeviceEventResp {
    bool success = 1;
}
message ListDeviceEventReq {
    int64 page = 1;
    int64 page_size = 2;
    uint64 device_id = 3;
    string event_type = 4;
    string event_level = 5;
    string source = 6;
    int64 is_delete = 7;
}
message ListDeviceEventResp {
    repeated DeviceEventResp list = 1;
    int64 total = 2;
}
message AddDeviceEventReq {
    uint64 device_id = 1;
    string event_type = 2;
    string event_level = 3;
    string title = 4;
    string description = 5;
    string source = 6;
    string extra_data = 7;
}

message GetDeviceStatsReq {}

message DeviceStatsResp {
    int64 total = 1;
    int64 online = 2;
    int64 offline = 3;
    int64 warning = 4;
}

// ==================== Firmware ====================
message AddFirmwareReq {
    string name = 1;
    string version = 2;
    string device_type = 3;
    string file_url = 4;
    int64 file_size = 5;
    string md5 = 6;
    string changelog = 7;
    int64 is_force = 8;
}

message FirmwareResp {
    uint64 firmware_id = 1;
    string name = 2;
    string version = 3;
    string device_type = 4;
    string file_url = 5;
    int64 file_size = 6;
    string md5 = 7;
    string changelog = 8;
    int64 is_force = 9;
    int64 is_delete = 10;
    uint64 create_time = 11;
    uint64 update_time = 12;
}

message GetFirmwareReq {
    uint64 firmware_id = 1;
}

message DeleteFirmwareReq {
    uint64 firmware_id = 1;
}

message DeleteFirmwareResp {
    bool success = 1;
}

message ListFirmwareReq {
    int64 page = 1;
    int64 page_size = 2;
    string device_type = 3;
    string version = 4;
    string name = 5;
    int64 is_force = 6;
    int64 is_delete = 7;
}

message ListFirmwareResp {
    repeated FirmwareResp list = 1;
    int64 total = 2;
}

// ==================== FirmwareTask ====================
message PushFirmwareTaskReq {
    uint64 firmware_id = 1;
    repeated uint64 device_ids = 2;
}

message FirmwareTaskResp {
    uint64 firmware_task_id = 1;
    uint64 firmware_id = 2;
    uint64 device_id = 3;
    int64 status = 4;
    int64 progress = 5;
    string error_msg = 6;
    uint64 started_at = 7;
    uint64 completed_at = 8;
    uint64 create_time = 9;
    uint64 update_time = 10;
}

message GetFirmwareTaskReq {
    uint64 firmware_task_id = 1;
}

message ListFirmwareTaskReq {
    int64 page = 1;
    int64 page_size = 2;
    uint64 firmware_id = 3;
    uint64 device_id = 4;
    int64 status = 5;
}

message ListFirmwareTaskResp {
    repeated FirmwareTaskResp list = 1;
    int64 total = 2;
}

service Device {
    rpc AddDevice (AddDeviceReq) returns (DeviceResp);
    rpc UpdateDevice (DeviceResp) returns (DeviceResp);
    rpc GetDevice (GetDeviceReq) returns (DeviceResp);
    rpc DeleteDevice (DeleteDeviceReq) returns (DeleteDeviceResp);
    rpc ListDevice (ListDeviceReq) returns (ListDeviceResp);
    rpc AddApp (AddAppReq) returns (AppResp);
    rpc UpdateApp (AppResp) returns (AppResp);
    rpc GetApp (GetAppReq) returns (AppResp);
    rpc DeleteApp (DeleteAppReq) returns (DeleteAppResp);
    rpc ListApp (ListAppReq) returns (ListAppResp);
    rpc AddDeviceEvent (AddDeviceEventReq) returns (DeviceEventResp);
    rpc DeleteDeviceEvent (DeleteDeviceEventReq) returns (DeleteDeviceEventResp);
    rpc GetDeviceEvent (GetDeviceEventReq) returns (DeviceEventResp);
    rpc ListDeviceEvent (ListDeviceEventReq) returns (ListDeviceEventResp);
    rpc GetDeviceStats (GetDeviceStatsReq) returns (DeviceStatsResp);
    rpc AddFirmware (AddFirmwareReq) returns (FirmwareResp);
    rpc UpdateFirmware (FirmwareResp) returns (FirmwareResp);
    rpc GetFirmware (GetFirmwareReq) returns (FirmwareResp);
    rpc DeleteFirmware (DeleteFirmwareReq) returns (DeleteFirmwareResp);
    rpc ListFirmware (ListFirmwareReq) returns (ListFirmwareResp);
    rpc PushFirmwareTask (PushFirmwareTaskReq) returns (FirmwareTaskResp);
    rpc GetFirmwareTask (GetFirmwareTaskReq) returns (FirmwareTaskResp);
    rpc ListFirmwareTask (ListFirmwareTaskReq) returns (ListFirmwareTaskResp);
}
