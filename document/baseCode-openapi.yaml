openapi: 3.0.3
info:
  title: BaseCode API 文档
  description: 基础代码管理 API 接口文档
  version: 1.0.0
servers:
  - url: http://localhost:9090
    description: 本地开发环境
tags:
  - name: BaseCode
    description: 基础代码管理
  - name: BaseCodeItem
    description: 基础代码项管理
