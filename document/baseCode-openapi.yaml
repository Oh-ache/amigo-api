paths:
  /api/base_code/get:
    get:
      tags:
        - BaseCode
      summary: 获取基础代码
      description: 根据条件获取基础代码信息
      parameters:
        - name: base_code_id
          in: query
          description: 基础代码ID
          schema:
            type: integer
            format: uint64
            default: 0
        - name: sort_key
          in: query
          description: 分类键
          schema:
            type: string
            default: ""
        - name: key
          in: query
          description: 键
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResp'
  /api/base_code/list:
