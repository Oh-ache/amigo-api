            default: ""
        - name: content2
          in: query
          description: 内容2
          schema:
            type: string
            default: ""
        - name: content3
          in: query
          description: 内容3
          schema:
            type: string
            default: ""
        - name: content4
          in: query
          description: 内容4
          schema:
            type: string
            default: ""
        - name: is_delete
          in: query
          description: 是否删除 (0:否,1:是,2:全部)
          schema:
            type: integer
            format: int64
            default: 2
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            format: int64
            default: 1
        - name: page_size
          in: query
          description: 每页条数
          schema:
