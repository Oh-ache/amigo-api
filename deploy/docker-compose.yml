      # environment:
      # - PORT=9094
      # networks:
      # - app-network
      # depends_on:
      # - ai-rpc
      # restart: unless-stopped

  mqueue-job:
    image: registry.cn-hangzhou.aliyuncs.com/theacheapp/mqueue-job:20260702153709
    container_name: mqueue-job
    expose:
      - "7001"
    environment:
      - PORT=7001
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge